name: 'Check'
on:
  pull_request:
  push:
    branches:
        - 'trunk'

jobs:
  check:
    runs-on: 'ubuntu-24.04'
    container:
      image: 'rust:1.94.1-bullseye'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Install rustfmt and clippy'
        run: 'rustup component add rustfmt clippy'

      - name: 'Load cached builds'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 'Build application'
        run: 'cargo build'

      - name: 'Check format'
        run: 'cargo fmt --check'

      - name: 'Lint with Clippy'
        run: 'cargo clippy'

      - name: 'Run tests'
        run: 'cargo test'
